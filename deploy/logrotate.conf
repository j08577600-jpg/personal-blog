# /etc/logrotate.d/personal-blog
# personal-blog 日志轮转规则
# 部署：sudo cp deploy/logrotate.conf /etc/logrotate.d/personal-blog

# journald 日志轮转（仅在 /var/log/journal/ 持久化目录存在时生效）
/var/log/journal/ {
    weekly
    rotate 4
    compress
    delaycompress
    notifempty
    missingok
    maxsize 100M
}

/var/log/journal/*/*.journal {
    weekly
    rotate 4
    compress
    delaycompress
    notifempty
    missingok
}

# Nginx 访问日志
/var/log/nginx/access.log {
    weekly
    rotate 4
    compress
    delaycompress
    notifempty
    missingok
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid) || true
    endscript
}

# Nginx 错误日志
/var/log/nginx/error.log {
    weekly
    rotate 4
    compress
    delaycompress
    notifempty
    missingok
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid) || true
    endscript
}
